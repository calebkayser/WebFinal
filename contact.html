<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact – GreenTech Solutions</title>
    <link rel="stylesheet" href="css/styles.css">
    <script defer src="js/script.js"></script>
</head>

<body>
    <header>
        <h1 class="site-title">GreenTech Solutions</h1>
    </header>

    <nav class="main-nav">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="products.html">Products</a>
        <a href="blog.html">Resources</a>
        <a href="contact.html" aria-current="page">Contact</a>
        <button id="contrastToggle" class="contrast-toggle">High Contrast</button>
    </nav>

    <main>
        <section>
            <h2>Contact Us</h2>
            <p>Have questions? We’d love to hear from you.</p>

            <div class="contact-info">
                <p><strong>Email:</strong> hello@greentech.example</p>
                <p><strong>Phone:</strong> (555) 123‑4567</p>
                <p><strong>Address:</strong> 1200 Evergreen Way, Green City, GA</p>
            </div>
        </section>

        <section>
            <h2>Send a Message</h2>

            <form id="contactForm" class="simple-form">
                <label for="name">Name</label>
                <input type="text" id="name" required>

                <label for="email">Email</label>
                <input type="email" id="email" required>

                <label for="message">Message</label>
                <textarea id="message" rows="4" required></textarea>

                <button type="submit">Submit</button>
                <p id="contactMessage" class="form-message" aria-live="polite"></p>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; <span id="year"></span> GreenTech Solutions</p>
    </footer>
</body>
</html>
